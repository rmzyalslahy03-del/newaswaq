<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </linearGradient>
  </defs>
  
  <!-- خلفية برتقالية مستديرة -->
  <rect width="512" height="512" rx="112" fill="url(#grad)"/>
  
  <!-- سلة تسوق بيضاء (مستوحاة من شوبيفاي) -->
  <path d="M120 160 L392 160 L370 290 C366 310 350 322 330 322 L182 322 C162 322 146 310 142 290 Z" 
        fill="#FFFFFF" stroke="#1E293B" stroke-width="14" stroke-linejoin="round"/>
  
  <!-- مقبض السلة -->
  <path d="M156 160 L176 120 C184 100 206 88 216 88 C226 88 248 100 256 120 L276 160" 
        fill="none" stroke="#1E293B" stroke-width="16" stroke-linecap="round"/>
  
  <!-- عجلات السلة -->
  <circle cx="170" cy="348" r="22" fill="#1E293B"/>
  <circle cx="262" cy="348" r="22" fill="#1E293B"/>
  
  <!-- حروف S.R باللون الأسود -->
  <text x="256" y="230" font-family="Arial, sans-serif" font-size="80" font-weight="bold" 
        fill="#1E293B" text-anchor="middle" dominant-baseline="central">S.R</text>
  
  <!-- اسم التطبيق أسفل السلة -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">أسواق الريادة</text>
  
  <!-- لمسة جمالية (نقطة ضوء) -->
  <circle cx="130" cy="130" r="8" fill="#FFFFFF" opacity="0.3"/>
</svg>
