<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- الحقيبة الزرقاء الداكنة (الخلفية، على اليسار) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="18" y="28" width="42" height="52" rx="3" ry="3" fill="#2C3E50" />
    <!-- طي الورق العلوي -->
    <rect x="18" y="28" width="42" height="6" fill="#1A252F" rx="2" />
    <!-- تفصيلة خط الطي -->
    <line x1="18" y1="34" x2="60" y2="34" stroke="#121922" stroke-width="1.5" />
    <!-- شريط تزييني ذهبي -->
    <rect x="18" y="52" width="42" height="4" fill="#F1C40F" opacity="0.9" />
    <!-- ظل خفيف تحت الحقيبة -->
    <ellipse cx="39" cy="82" rx="20" ry="2" fill="rgba(0,0,0,0.15)" />
  </g>
  <!-- مقابض الحقيبة الزرقاء -->
  <path d="M23 28 C23 10, 39 10, 39 28" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />
  <path d="M42 28 C42 10, 58 10, 58 28" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />

  <!-- الحقيبة الوردية/السلمون (الأمامية، على اليمين) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="44" y="36" width="40" height="46" rx="3" ry="3" fill="#FF6B6B" />
    <!-- طي الورق العلوي -->
    <rect x="44" y="36" width="40" height="6" fill="#FF4757" rx="2" />
    <!-- تفصيلة خط الطي -->
    <line x1="44" y1="42" x2="84" y2="42" stroke="#E84118" stroke-width="1.5" />
    <!-- شريط تزييني ذهبي -->
    <rect x="44" y="58" width="40" height="4" fill="#F1C40F" opacity="0.9" />
    <!-- ظل تحت الحقيبة -->
    <ellipse cx="64" cy="84" rx="19" ry="2" fill="rgba(0,0,0,0.15)" />
  </g>
  <!-- مقابض الحقيبة الوردية -->
  <path d="M49 36 C49 18, 64 18, 64 36" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />
  <path d="M67 36 C67 18, 82 18, 82 36" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />

  <!-- إيصال ورقي صغير يخرج من الحقيبة الوردية -->
  <g transform="translate(68, 44) rotate(12)">
    <rect x="0" y="0" width="5" height="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5" />
    <line x1="1" y1="3" x2="4" y2="3" stroke="#CBD5E0" stroke-width="0.7" />
    <line x1="1" y1="6" x2="3.5" y2="6" stroke="#CBD5E0" stroke-width="0.7" />
  </g>
</svg>
