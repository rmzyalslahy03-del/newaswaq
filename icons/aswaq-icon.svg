<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- خلفية دائرية -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="12" />

  <!-- أيقونة السلة (تصميم مبسط) -->
  <g transform="translate(256,200)">
    <!-- مقبض السلة -->
    <path d="M-40,-40 C-40,-70 40,-70 40,-40" fill="none" stroke="#fbbf24" stroke-width="14" stroke-linecap="round" />
    <!-- جسم السلة -->
    <rect x="-70" y="-30" width="140" height="100" rx="20" fill="#fbbf24" />
    <!-- خط أفقي للتظليل -->
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#0f172a" stroke-width="4" opacity="0.3" />
  </g>

  <!-- حرف SR داخل السلة -->
  <text x="256" y="240" font-family="Cairo, Arial, sans-serif" font-weight="700" font-size="90"
        fill="#0f172a" text-anchor="middle" alignment-baseline="middle" letter-spacing="4">SR</text>

  <!-- اسم التطبيق أسفل الأيقونة -->
  <text x="256" y="420" font-family="Cairo, Arial, sans-serif" font-weight="600" font-size="48"
        fill="#fbbf24" text-anchor="middle" alignment-baseline="middle">أسواق الريادة</text>
</svg>
