<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ظلال أرضية -->
  <ellipse cx="42" cy="86" rx="24" ry="3" fill="rgba(0,0,0,0.1)" />
  <ellipse cx="65" cy="83" rx="22" ry="2.5" fill="rgba(0,0,0,0.12)" />

  <!-- الحقيبة البنية (الخلفية، عمودية - أطول وأضيق) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="16" y="18" width="32" height="66" rx="3" ry="3" fill="#C49A6C" />
    <!-- طي الورق العلوي -->
    <rect x="16" y="18" width="32" height="7" fill="#B58B5A" rx="2" />
    <line x1="16" y1="25" x2="48" y2="25" stroke="#A67B4A" stroke-width="1.5" />
    <!-- شريط زخرفي (أحمر) -->
    <rect x="16" y="48" width="32" height="4" fill="#E63946" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة البنية -->
  <path d="M20 18 C20 4, 33 4, 33 18" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  <path d="M35 18 C35 4, 47 4, 47 18" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />

  <!-- الحقيبة البنفسجية (الأمامية، أفقية - أعرض وأقصر) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="44" y="40" width="48" height="46" rx="3" ry="3" fill="#9B59B6" />
    <!-- طي الورق العلوي -->
    <rect x="44" y="40" width="48" height="7" fill="#8E44AD" rx="2" />
    <line x1="44" y1="47" x2="92" y2="47" stroke="#7D3C98" stroke-width="1.5" />
    <!-- شريط زخرفي (أصفر) -->
    <rect x="44" y="62" width="48" height="4" fill="#F1C40F" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة البنفسجية -->
  <path d="M49 40 C49 28, 62 28, 62 40" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  <path d="M69 40 C69 28, 82 28, 82 40" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />

  <!-- إيصال ورقي صغير يخرج من الحقيبة البنفسجية -->
  <g transform="translate(76, 48) rotate(14)">
    <rect x="0" y="0" width="5.5" height="12" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="0.5" />
    <line x1="1" y1="3" x2="4.5" y2="3" stroke="#95A5A6" stroke-width="0.7" stroke-linecap="round" />
    <line x1="1" y1="6" x2="4" y2="6" stroke="#95A5A6" stroke-width="0.7" stroke-linecap="round" />
    <line x1="1" y1="9" x2="3.5" y2="9" stroke="#95A5A6" stroke-width="0.7" stroke-linecap="round" />
  </g>
</svg>
