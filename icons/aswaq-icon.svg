<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ظلال أرضية -->
  <ellipse cx="40" cy="80" rx="18" ry="2" fill="rgba(0,0,0,0.1)" />
  <ellipse cx="68" cy="80" rx="28" ry="2.5" fill="rgba(0,0,0,0.12)" />

  <!-- الحقيبة الخلفية (زرقاء - عمودية) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="20" y="18" width="32" height="62" rx="3" ry="3" fill="#1E88E5" />
    <!-- طي الورق العلوي -->
    <rect x="20" y="18" width="32" height="6" fill="#1565C0" rx="2" />
    <line x1="20" y1="24" x2="52" y2="24" stroke="#0D47A1" stroke-width="1.5" />
    <!-- شريط تزييني أحمر -->
    <rect x="20" y="48" width="32" height="4" fill="#E63946" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة الخلفية -->
  <path d="M25 18 C25 4, 33 4, 33 18" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />
  <path d="M39 18 C39 4, 47 4, 47 18" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />

  <!-- الحقيبة الأمامية (برتقالية - أفقية) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="38" y="38" width="54" height="40" rx="3" ry="3" fill="#FF7043" />
    <!-- طي الورق العلوي -->
    <rect x="38" y="38" width="54" height="6" fill="#F4511E" rx="2" />
    <line x1="38" y1="44" x2="92" y2="44" stroke="#BF360C" stroke-width="1.5" />
    <!-- شريط تزييني أصفر -->
    <rect x="38" y="60" width="54" height="4" fill="#FFCA28" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة الأمامية -->
  <path d="M44 38 C44 24, 57 24, 57 38" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />
  <path d="M64 38 C64 24, 77 24, 77 38" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />

  <!-- إيصال ورقي صغير -->
  <g transform="translate(76, 48) rotate(15)">
    <rect x="0" y="0" width="5" height="11" fill="#FFFFFF" stroke="#D5D8DC" stroke-width="0.5" />
    <line x1="1" y1="3" x2="4" y2="3" stroke="#BDC3C7" stroke-width="0.7" />
    <line x1="1" y1="6" x2="3.5" y2="6" stroke="#BDC3C7" stroke-width="0.7" />
  </g>
</svg>
