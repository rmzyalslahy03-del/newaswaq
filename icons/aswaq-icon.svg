أيقونة 
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- الكيس الخلفي (أغمق، أطول) -->
  <g fill="#8B5A2B">
    <!-- جسم الكيس الخلفي -->
    <rect x="25" y="20" width="40" height="55" rx="3" ry="3" />
    <!-- خط طي أعلى الكيس الخلفي -->
    <line x1="25" y1="35" x2="65" y2="35" stroke="#6B4226" stroke-width="2" />
  </g>
  <!-- مقابض الكيس الخلفي -->
  <path d="M30 20 C30 8, 45 8, 45 20" fill="none" stroke="#6B4226" stroke-width="3" stroke-linecap="round" />
  <path d="M50 20 C50 8, 65 8, 65 20" fill="none" stroke="#6B4226" stroke-width="3" stroke-linecap="round" />

  <!-- الكيس الأمامي (أفتح، أقصر) -->
  <g fill="#CD853F">
    <!-- جسم الكيس الأمامي -->
    <rect x="20" y="45" width="35" height="45" rx="3" ry="3" />
    <!-- خط طي أعلى الكيس الأمامي -->
    <line x1="20" y1="60" x2="55" y2="60" stroke="#8B5A2B" stroke-width="2" />
  </g>
  <!-- مقابض الكيس الأمامي -->
  <path d="M25 45 C25 33, 37 33, 37 45" fill="none" stroke="#8B5A2B" stroke-width="3" stroke-linecap="round" />
  <path d="M40 45 C40 33, 52 33, 52 45" fill="none" stroke="#8B5A2B" stroke-width="3" stroke-linecap="round" />

  <!-- إيصال ورقي يخرج من الكيس الأمامي -->
  <rect x="48" y="52" width="5" height="12" fill="white" stroke="#ccc" stroke-width="0.5" transform="rotate(10 48 52)" />
  <line x1="49" y1="55" x2="52" y2="55" stroke="#ccc" stroke-width="0.5" transform="rotate(10 48 52)" />
  <line x1="49" y1="58" x2="51" y2="58" stroke="#ccc" stroke-width="0.5" transform="rotate(10 48 52)" />
</svg>
