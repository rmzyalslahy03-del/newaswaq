<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ظلال أرضية -->
  <ellipse cx="40" cy="80" rx="22" ry="2.5" fill="rgba(0,0,0,0.1)" />
  <ellipse cx="66" cy="80" rx="26" ry="2.5" fill="rgba(0,0,0,0.12)" />

  <!-- الحقيبة الخلفية (زرقاء - عمودية وأوسع) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="16" y="20" width="40" height="58" rx="3" ry="3" fill="#1E88E5" />
    <!-- طي الورق العلوي -->
    <rect x="16" y="20" width="40" height="6" fill="#1565C0" rx="2" />
    <!-- خط الطي -->
    <line x1="16" y1="26" x2="56" y2="26" stroke="#0D47A1" stroke-width="1.5" />
    <!-- شريط تزييني أحمر -->
    <rect x="16" y="46" width="40" height="4" fill="#E63946" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة الخلفية (موحدة اللون) -->
  <path d="M21 20 C21 4, 33 4, 33 20" fill="none" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round" />
  <path d="M39 20 C39 4, 51 4, 51 20" fill="none" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round" />

  <!-- الحقيبة الأمامية (برتقالية - أفقية) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="38" y="38" width="52" height="40" rx="3" ry="3" fill="#FF7043" />
    <!-- طي الورق العلوي -->
    <rect x="38" y="38" width="52" height="6" fill="#F4511E" rx="2" />
    <!-- خط الطي -->
    <line x1="38" y1="44" x2="90" y2="44" stroke="#BF360C" stroke-width="1.5" />
    <!-- شريط تزييني أصفر -->
    <rect x="38" y="60" width="52" height="4" fill="#FFCA28" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة الأمامية (موحدة اللون) -->
  <path d="M44 38 C44 24, 57 24, 57 38" fill="none" stroke="#F4511E" stroke-width="3.5" stroke-linecap="round" />
  <path d="M64 38 C64 24, 77 24, 77 38" fill="none" stroke="#F4511E" stroke-width="3.5" stroke-linecap="round" />

  <!-- إيصال ورقي صغير -->
  <g transform="translate(74, 48) rotate(15)">
    <rect x="0" y="0" width="5" height="11" fill="#FFFFFF" stroke="#D5D8DC" stroke-width="0.5" />
    <line x1="1" y1="3" x2="4" y2="3" stroke="#BDC3C7" stroke-width="0.7" />
    <line x1="1" y1="6" x2="3.5" y2="6" stroke="#BDC3C7" stroke-width="0.7" />
  </g>
</svg>
