<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ظلال أرضية -->
  <ellipse cx="50" cy="76" rx="28" ry="3" fill="rgba(0,0,0,0.08)" />
  <ellipse cx="50" cy="78" rx="22" ry="2" fill="rgba(0,0,0,0.1)" />

  <!-- الحقيبة البنية (الخلفية، يسار) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="26" y="24" width="42" height="48" rx="3" ry="3" fill="#795548" />
    <!-- طي الورق العلوي -->
    <rect x="26" y="24" width="42" height="6" rx="2" ry="2" fill="#5D4037" />
    <line x1="26" y1="30" x2="68" y2="30" stroke="#4E342E" stroke-width="1.5" />
    <!-- شريط زخرفي -->
    <rect x="26" y="48" width="42" height="4" fill="#FFC107" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة البنية -->
  <path d="M 30 24 C 30 8, 42 8, 42 24" fill="none" stroke="#4E342E" stroke-width="3" stroke-linecap="round" />
  <path d="M 48 24 C 48 8, 60 8, 60 24" fill="none" stroke="#4E342E" stroke-width="3" stroke-linecap="round" />

  <!-- الحقيبة البرتقالية (الأمامية، يمين) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="46" y="16" width="36" height="52" rx="3" ry="3" fill="#FF9800" />
    <!-- طي الورق العلوي -->
    <rect x="46" y="16" width="36" height="6" rx="2" ry="2" fill="#F57C00" />
    <line x1="46" y1="22" x2="82" y2="22" stroke="#E65100" stroke-width="1.5" />
    <!-- شريط زخرفي -->
    <rect x="46" y="42" width="36" height="4" fill="#FFEB3B" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة البرتقالية -->
  <path d="M 50 16 C 50 4, 60 4, 60 16" fill="none" stroke="#E65100" stroke-width="3" stroke-linecap="round" />
  <path d="M 64 16 C 64 4, 74 4, 74 16" fill="none" stroke="#E65100" stroke-width="3" stroke-linecap="round" />

  <!-- إيصال ورقي يخرج من الحقيبة الأمامية -->
  <g transform="translate(68, 24) rotate(15)">
    <rect x="0" y="0" width="4.5" height="10" fill="#FFFFFF" stroke="#D5D8DC" stroke-width="0.5" />
    <line x1="1" y1="2.5" x2="3.5" y2="2.5" stroke="#BDC3C7" stroke-width="0.5" />
    <line x1="1" y1="5" x2="3" y2="5" stroke="#BDC3C7" stroke-width="0.5" />
    <line x1="1" y1="7.5" x2="2.5" y2="7.5" stroke="#BDC3C7" stroke-width="0.5" />
  </g>
</svg>
