<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- خلفية زرقاء داكنة متدرجة -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <!-- إطار ذهبي متدرج -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- ظل خفيف -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- دائرة الخلفية -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="14" filter="url(#shadow)"/>

  <!-- أيقونة السلة (مقبض + جسم) -->
  <g transform="translate(256, 185)">
    <!-- مقبض السلة -->
    <path d="M-50,-50 C-50,-85 50,-85 50,-50" fill="none" stroke="#fbbf24" stroke-width="18" stroke-linecap="round"/>
    <!-- جسم السلة -->
    <rect x="-80" y="-40" width="160" height="115" rx="28" fill="#fbbf24"/>
    <!-- تظليل خفيف داخل السلة -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#0f172a" stroke-width="5" opacity="0.3"/>
  </g>

  <!-- الحرفان "SR" داخل السلة -->
  <text x="256" y="225" font-family="Cairo, Arial, sans-serif" font-weight="700" font-size="120"
        fill="#0f172a" text-anchor="middle" alignment-baseline="middle" letter-spacing="8">SR</text>

  <!-- اسم التطبيق أسفل الأيقونة -->
  <text x="256" y="435" font-family="Cairo, Arial, sans-serif" font-weight="600" font-size="44"
        fill="#fbbf24" text-anchor="middle" alignment-baseline="middle">أسواق الريادة</text>
</svg>
