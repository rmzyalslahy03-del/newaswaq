<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- خلفية زجاجية نصف شفافة -->
    <radialGradient id="glassBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </radialGradient>
    <!-- إطار نصف شفاف -->
    <linearGradient id="glassStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.2" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- خلفية دائرية زجاجية -->
  <circle cx="256" cy="256" r="248" fill="url(#glassBg)" stroke="url(#glassStroke)" stroke-width="14" filter="url(#shadow)" />

  <!-- ====== الكيس الأول (بني) ====== -->
  <g transform="translate(226, 220)">
    <!-- مقابض الكيس (بيضاء) -->
    <path d="M-22,-50 C-22,-75 -12,-75 -12,-50" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M12,-50 C12,-75 22,-75 22,-50" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <!-- جسم الكيس -->
    <path d="M-35,-50 L35,-50 L35,35 Q35,55 15,55 L-15,55 Q-35,55 -35,35 Z" fill="#C49A6C" />
    <!-- تفصيلة طي الورق العلوي -->
    <rect x="-35" y="-50" width="70" height="6" fill="#B8925C" rx="2" />
    <line x1="-35" y1="-44" x2="35" y2="-44" stroke="#A67B4A" stroke-width="1.5" />
    <!-- شريط تزييني أحمر -->
    <rect x="-35" y="0" width="70" height="4" fill="#E63946" opacity="0.9" />
    <!-- اختصار العلامة التجارية AR -->
    <text x="0" y="-7.5" font-family="Cairo, Arial, sans-serif" font-weight="700" font-size="28"
          fill="#FFFFFF" text-anchor="middle" alignment-baseline="middle">AR</text>
  </g>

  <!-- ====== الكيس الثاني (بنفسجي) ====== -->
  <g transform="translate(286, 220)">
    <!-- مقابض الكيس (بيضاء) -->
    <path d="M-22,-50 C-22,-75 -12,-75 -12,-50" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M12,-50 C12,-75 22,-75 22,-50" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <!-- جسم الكيس -->
    <path d="M-35,-50 L35,-50 L35,35 Q35,55 15,55 L-15,55 Q-35,55 -35,35 Z" fill="#9B59B6" />
    <!-- تفصيلة طي الورق العلوي -->
    <rect x="-35" y="-50" width="70" height="6" fill="#8E44AD" rx="2" />
    <line x1="-35" y1="-44" x2="35" y2="-44" stroke="#7D3C98" stroke-width="1.5" />
    <!-- شريط تزييني أصفر -->
    <rect x="-35" y="0" width="70" height="4" fill="#F1C40F" opacity="0.9" />
    <!-- اختصار العلامة التجارية AR -->
    <text x="0" y="-7.5" font-family="Cairo, Arial, sans-serif" font-weight="700" font-size="28"
          fill="#FFFFFF" text-anchor="middle" alignment-baseline="middle">AR</text>
  </g>
</svg>
