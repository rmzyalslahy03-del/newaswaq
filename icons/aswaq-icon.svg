<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ظلال أرضية -->
  <ellipse cx="46" cy="84" rx="22" ry="2.5" fill="rgba(0,0,0,0.1)" />
  <ellipse cx="62" cy="82" rx="20" ry="2.5" fill="rgba(0,0,0,0.12)" />

  <!-- الحقيبة البنية (الخلفية، على اليسار) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="14" y="20" width="44" height="58" rx="3" ry="3" fill="#C49A6C" />
    <!-- طي الورق العلوي -->
    <rect x="14" y="20" width="44" height="7" fill="#B58B5A" rx="2" />
    <line x1="14" y1="27" x2="58" y2="27" stroke="#A67B4A" stroke-width="1.5" />
    <!-- شريط زخرفي (أحمر) -->
    <rect x="14" y="48" width="44" height="4" fill="#E63946" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة البنية -->
  <path d="M19 20 C19 4, 34 4, 34 20" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  <path d="M38 20 C38 4, 53 4, 53 20" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />

  <!-- الحقيبة البنفسجية (الأمامية، على اليمين) -->
  <g>
    <!-- جسم الحقيبة -->
    <rect x="42" y="32" width="42" height="50" rx="3" ry="3" fill="#9B59B6" />
    <!-- طي الورق العلوي -->
    <rect x="42" y="32" width="42" height="7" fill="#8E44AD" rx="2" />
    <line x1="42" y1="39" x2="84" y2="39" stroke="#7D3C98" stroke-width="1.5" />
    <!-- شريط زخرفي (أصفر) -->
    <rect x="42" y="56" width="42" height="4" fill="#F1C40F" opacity="0.9" />
  </g>
  <!-- مقابض الحقيبة البنفسجية -->
  <path d="M47 32 C47 16, 60 16, 60 32" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  <path d="M66 32 C66 16, 79 16, 79 32" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />

  <!-- إيصال ورقي يخرج من الحقيبة البنفسجية -->
  <g transform="translate(70, 40) rotate(14)">
    <rect x="0" y="0" width="5.5" height="12" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="0.5" />
    <line x1="1" y1="3" x2="4.5" y2="3" stroke="#95A5A6" stroke-width="0.7" stroke-linecap="round" />
    <line x1="1" y1="6" x2="4" y2="6" stroke="#95A5A6" stroke-width="0.7" stroke-linecap="round" />
    <line x1="1" y1="9" x2="3.5" y2="9" stroke="#95A5A6" stroke-width="0.7" stroke-linecap="round" />
  </g>
</svg>
