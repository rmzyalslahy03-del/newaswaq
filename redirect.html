<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحويل...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Cairo', sans-serif;
            color: #fbbf24;
            text-align: center;
            direction: rtl;
        }
        .loader-box {
            background: rgba(255,255,255,0.05);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(251,191,36,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #e2e8f0;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .url-display {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #94a3b8;
            word-break: break-all;
            margin-top: 10px;
            font-family: monospace;
        }
        .retry-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }
        .retry-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
    <script>
        (function() {
            // استخراج المعاملات من الرابط
            const params = new URLSearchParams(window.location.search);
            let target = params.get('to') || '';
            const utmParams = [];
            const allowedUtm = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'utm_id'];

            // جمع معاملات UTM
            allowedUtm.forEach(function(key) {
                if (params.has(key) && params.get(key).trim() !== '') {
                    utmParams.push(key + '=' + encodeURIComponent(params.get(key).trim()));
                }
            });

            // تجميع أي معاملات إضافية غير معروفة (مثل ref, source, etc)
            params.forEach(function(value, key) {
                if (!allowedUtm.includes(key) && key !== 'to' && value.trim() !== '') {
                    utmParams.push(key + '=' + encodeURIComponent(value.trim()));
                }
            });

            // تنظيف الـ target من أي # زائدة
            target = target.replace(/^#/, '').trim();

            // بناء الرابط النهائي
            let baseUrl = '/index.html';
            let queryString = utmParams.length > 0 ? '?' + utmParams.join('&') : '';
            let hashString = target ? '#' + target : '';

            // إذا كان الـ target يبدأ بـ / (رابط كامل) نحتفظ به كما هو
            let finalUrl;
            if (target.startsWith('http://') || target.startsWith('https://')) {
                // رابط خارجي (نادر لكن للاحتياط)
                finalUrl = target;
            } else {
                finalUrl = baseUrl + queryString + hashString;
            }

            // عرض الرابط في الصفحة (للتأكد)
            document.addEventListener('DOMContentLoaded', function() {
                const urlDisplay = document.getElementById('urlDisplay');
                if (urlDisplay) {
                    urlDisplay.textContent = 'جاري التوجيه إلى: ' + finalUrl;
                }
            });

            // الانتظار 1.5 ثانية ثم التوجيه (لتظهر صفحة التحميل)
            setTimeout(function() {
                window.location.replace(finalUrl);
            }, 1500);

            // زر إعادة المحاولة (في حال علق)
            window.retryRedirect = function() {
                window.location.replace(finalUrl);
            };

            // دالة احتياطية: إذا لم يحدث التوجيه بعد 5 ثوانٍ، نعيد المحاولة تلقائياً
            setTimeout(function() {
                // إذا كنا لا نزال في هذه الصفحة بعد 5 ثوانٍ، نعيد التوجيه
                if (window.location.href.includes('redirect.html')) {
                    window.location.replace(finalUrl);
                }
            }, 5000);

            console.log('[Redirect] التوجيه إلى:', finalUrl);
        })();
    </script>
</head>
<body>
    <div class="loader-box">
        <div class="spinner"></div>
        <h2>🔄 جاري تحويلك إلى المتجر...</h2>
        <p>يرجى الانتظار لحظة</p>
        <div class="url-display" id="urlDisplay">جاري التوجيه...</div>
        <button class="retry-btn" onclick="window.retryRedirect()">🔄 إعادة المحاولة</button>
    </div>
</body>
</html>
