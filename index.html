    <!-- أنماط خاصة ببطاقات الفئات (مستطيلة - صورة علوية / أيقونة واسم سفلي) -->
    <style>
        /* ===== شبكة الفئات - بطاقات مستطيلة (صورة علوية / أيقونة واسم سفلي) ===== */
        .index-grid {
            display: grid;
            gap: 20px;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 15px;
            /* يتم تحديد grid-template-columns عبر JavaScript (افتراضي 4) */
        }

        .index-item {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
        }

        .index-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            border-color: #fbbf24;
        }

        /* ===== الجزء العلوي: صورة الفئة (مستطيلة) ===== */
        .index-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1.2; /* مستطيل عمودي */
            overflow: hidden;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .index-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .index-item:hover .index-image-wrapper img {
            transform: scale(1.05);
        }

        /* ===== الجزء السفلي: أيقونة + اسم الفئة ===== */
        .index-content {
            padding: 14px 10px 16px;
            background: #ffffff;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
            border-top: 1px solid #f0f0f0;
        }

        .index-icon {
            font-size: 1.6rem;
            line-height: 1;
            margin-bottom: 2px;
        }

        .index-title {
            font-weight: 700;
            font-size: 1rem;
            color: #0f172a;
            margin: 0;
            line-height: 1.3;
        }

        /* إخفاء العناصر القديمة */
        .index-image {
            display: none;
        }

        /* ===== وضع القائمة (عند الاختيار من الإعدادات) ===== */
        .index-grid.list-mode {
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
            grid-template-columns: none !important;
        }

        .index-grid.list-mode .index-item {
            width: 100%;
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            padding: 10px !important;
            border-radius: 16px !important;
            border: 1px solid #e2e8f0 !important;
            box-shadow: none !important;
        }

        .index-grid.list-mode .index-item .index-image-wrapper {
            width: 80px !important;
            height: 80px !important;
            aspect-ratio: 1/1 !important;
            flex-shrink: 0 !important;
            border-radius: 12px !important;
        }

        .index-grid.list-mode .index-item .index-content {
            flex: 1 !important;
            text-align: right !important;
            padding: 0 15px !important;
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            gap: 10px !important;
            border-top: none !important;
        }

        .index-grid.list-mode .index-item .index-icon {
            font-size: 1.2rem !important;
        }

        /* ===== التجاوب (يتم الحفاظ على عدد الأعمدة المحدد بواسطة JS، مع تعديل المسافات فقط) ===== */
        @media (max-width: 992px) {
            .index-grid { gap: 16px; }
        }
        @media (max-width: 600px) {
            .index-grid { gap: 12px; }
            .index-content { padding: 10px 8px 12px; }
            .index-icon { font-size: 1.3rem; }
            .index-title { font-size: 0.85rem; }
            .index-image-wrapper { aspect-ratio: 1 / 1.1; }
        }
        @media (max-width: 400px) {
            .index-grid { gap: 8px; }
            .index-item { border-radius: 14px; }
            .index-content { padding: 8px 6px 10px; }
            .index-icon { font-size: 1.1rem; }
            .index-title { font-size: 0.75rem; }
            .index-image-wrapper { aspect-ratio: 1 / 1; }
        }

        /* ===== أنماط المنتجات المكبرة (تطابق common.css) ===== */
        .product-item {
            width: 180px;
            display: inline-block;
            text-align: center;
            background: var(--product-bg, #ffffff);
            border-radius: 18px;
            padding: 12px 10px;
            border: 1px solid #e9edf2;

            position: relative;
            cursor: pointer;
            vertical-align: top;
        }
        .product-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .product-item img {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            object-fit: cover;
            background: #f8fafc;
            display: block;
            margin: 0 auto 8px;
        }
        .product-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin: 4px 0 2px;
            height: 2.6em;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .price-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            align-items: baseline;
            margin: 6px 0 4px;
            font-size: 0.95rem;
        }
        .old-price {
            color: #94a3b8;
            text-decoration: line-through;
            font-size: 0.8rem;
        }
        .new-price {
            color: #3b82f6;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .product-visit-btn,
        .add-to-cart-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            margin-top: 6px;
            margin-left: 4px;
        }
        .add-to-cart-btn {
            background: #10b981;
        }
        .product-visit-btn:hover,
        .add-to-cart-btn:hover {
            transform: scale(1.04);
            filter: brightness(1.05);
        }
        .like-btn, .favorite-btn {
            background: transparent;
            color: #64748b;
            font-size: 1.2rem;
            padding: 0;
            border: none;
            cursor: pointer;
        }
        .like-btn.liked { color: #ef4444; }
        .favorite-btn.favorited { color: #fbbf24; }

        /* ===== أنماط الحاوية والقوائم الأفقية ===== */
        .products-track {
            display: inline-flex;
            gap: 16px;
        }
        .products-horizontal {
            padding: 15px;
            overflow-x: auto;
            white-space: nowrap;
            background: #f9fcff;
            margin-bottom: 20px;
            border-radius: 20px;
            scrollbar-width: thin;
        }
        .products-horizontal::-webkit-scrollbar { height: 6px; }
        .products-horizontal::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }

        /* منع التحديد والنسخ */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        img, a, button {
            -webkit-tap-highlight-color: transparent;
        }
    </style>

    <!-- ===== كود index.html النهائي ===== -->
    <script>
        // ============================================================
        // 1. دوال مساعدة (sanitize)
        // ============================================================
        function safeSanitize(text) {
            if (typeof DOMPurify !== 'undefined' && DOMPurify.sanitize) {
                return DOMPurify.sanitize(text);
            }
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        window.safeSanitize = safeSanitize;

        // ============================================================
        // 2. المتغيرات العامة
        // ============================================================
        let appData = null;

        // ============================================================
        // 3. حقن كود التتبع
        // ============================================================
        function injectTrackingCode() {
            if (!appData?.settings?.trackingCode) return;
            if (document.getElementById('custom-tracking-code')) return;
            const code = appData.settings.trackingCode;
            const temp = document.createElement('div');
            temp.innerHTML = code;
            while (temp.children.length > 0) {
                const child = temp.children[0];
                if (child.tagName === 'SCRIPT') {
                    const newScript = document.createElement('script');
                    for (const attr of child.attributes) {
                        newScript.setAttribute(attr.name, attr.value);
                    }
                    newScript.textContent = child.textContent;
                    document.head.appendChild(newScript);
                } else {
                    document.head.appendChild(child);
                }
            }
            temp.remove();
            const marker = document.createElement('meta');
            marker.id = 'custom-tracking-code';
            marker.setAttribute('data-added', 'true');
            document.head.appendChild(marker);
        }

        // ============================================================
        // 4. عرض الصفحة الرئيسية (مع بطاقات الفئات المستطيلة وإعدادات الفهرس)
        // ============================================================
        function renderHomePage() {
            if (!appData) return;
            
            // تحديث الهيدر
            document.getElementById('headerTitle').textContent = appData.header.title || 'مجمع أسواق ريادة المستهلك';
            document.getElementById('headerSubtitle').textContent = appData.header.subtitle || 'أفضل المتاجر والمنتجات بأفضل الأسعار';
            
            // شريط الأخبار
            document.getElementById('tickerContent').innerHTML = (appData.ticker || []).map(t => `<span>${safeSanitize(t)}</span>`).join('');
            
            // العلم السعودي
            const flagContainer = document.getElementById('saudiFlagContainer');
            const flagImg = document.getElementById('saudiFlagImg');
            if (appData.settings.showSaudiFlag) {
                flagContainer.style.display = 'inline';
                const flagUrl = appData.settings.saudiFlagUrl || 'https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg';
                flagImg.src = flagUrl;
            } else {
                flagContainer.style.display = 'none';
            }
            
            // أيقونات المستخدم والسلة
            if (appData.settings.cartEnabled) {
                document.getElementById('cartIcon').style.display = 'block';
            } else {
                document.getElementById('cartIcon').style.display = 'none';
            }
            if (appData.settings.enableUserProfile) {
                document.getElementById('profileLink').style.display = 'inline-block';
            } else {
                document.getElementById('profileLink').style.display = 'none';
            }
            
            // تحديث رقم واتساب العائم
            const waNumber = window.getWhatsAppNumber ? window.getWhatsAppNumber() : '967778562099';
            document.getElementById('whatsappFloat').href = `https://wa.me/${waNumber}`;
            
            // المسابقات
            if (appData.settings.contests && appData.settings.contests.length > 0) {
                document.getElementById('contestsBar').style.display = 'block';
                const content = appData.settings.contests.map(c => 
                    `<span class="contest-item"><i class="fas fa-trophy"></i> ${safeSanitize(c.name)} - ${safeSanitize(c.description)} (ينتهي: ${safeSanitize(c.endDate)})</span>`
                ).join('');
                document.getElementById('contestsContent').innerHTML = content;
            } else {
                document.getElementById('contestsBar').style.display = 'none';
            }
            
            // ===== شبكة الفئات (بطاقات مستطيلة - صورة علوية / أيقونة واسم سفلي) =====
            const indexGrid = document.getElementById('indexGrid');
            indexGrid.innerHTML = '';
            
            // قراءة إعدادات الفهرس من الإعدادات (مع دعم القيم الافتراضية)
            const displayMode = appData.settings.indexDisplayMode || 'grid';
            const columns = parseInt(appData.settings.indexColumns) || 4;
            
            // تطبيق نمط العرض على الحاوية (شبكة أو قائمة)
            if (displayMode === 'grid') {
                indexGrid.style.display = 'grid';
                indexGrid.style.gridTemplateColumns = `repeat(${Math.min(columns, 6)}, 1fr)`;
                indexGrid.style.gap = '20px';
                indexGrid.style.flexDirection = 'unset';
                indexGrid.classList.remove('list-mode');
            } else {
                // وضع قائمة عمودية
                indexGrid.style.display = 'flex';
                indexGrid.style.flexDirection = 'column';
                indexGrid.style.gap = '10px';
                indexGrid.style.gridTemplateColumns = 'none';
                indexGrid.classList.add('list-mode');
            }
            
            const categoriesForIndex = (appData.categories || [])
                .filter(cat => cat.showInIndex !== false)
                .sort((a, b) => (a.indexOrder || 0) - (b.indexOrder || 0));
            
            if (categoriesForIndex.length === 0) {
                indexGrid.innerHTML = '<p style="text-align:center; padding:20px; grid-column:1/-1;">لا توجد فئات لعرضها</p>';
            } else {
                categoriesForIndex.forEach(cat => {
                    const item = document.createElement('div');
                    item.className = 'index-item';
                    item.dataset.categoryId = cat.id;
                    
                    const imageSrc = cat.indexImage || cat.featuredImage || 'https://via.placeholder.com/400x300/0f172a/ffffff?text=' + encodeURIComponent(cat.name);
                    const iconColor = cat.color || '#9b4d96';
                    const iconClass = cat.icon || 'fas fa-tag';
                    
                    // في وضع القائمة، نضيف تنسيقاً خاصاً
                    if (displayMode === 'list') {
                        item.style.width = '100%';
                        item.style.display = 'flex';
                        item.style.flexDirection = 'row';
                        item.style.alignItems = 'center';
                        item.style.padding = '10px';
                        item.style.borderRadius = '16px';
                        item.style.border = '1px solid #e2e8f0';
                        item.style.boxShadow = 'none';
                    }
                    
                    item.innerHTML = `
                        <div class="index-image-wrapper">
                            <img src="${imageSrc}" alt="${safeSanitize(cat.name)}" loading="lazy">
                        </div>
                        <div class="index-content">
                            <i class="${iconClass} index-icon" style="color: ${iconColor};"></i>

                    // تنسيق إضافي لوضع القائمة
                    if (displayMode === 'list') {

                            content.style.borderTop = 'none';

                const storesGrid = section.querySelector(`#storesGrid-${cat.id}`);

                            : '';
                        
                        let actionButtons = '';
                        if (showUserFeatures) {
                            const isLiked = window.currentUser && window.currentUser.likes.includes(prod.id);
                            const isFavorited = window.currentUser && window.currentUser.favorites.includes(prod.id);
                            actionButtons = `
                                <div style="margin-top:5px;">
                                    <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="window.toggleLike('${prod.id}', '${store.id}', this)">
                                        ${isLiked ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>'}
                                    </button>
                                    <button class="favorite-btn ${isFavorited ? 'favorited' : ''}" onclick="window.toggleFavorite('${prod.id}', '${store.id}', this)">
                                        ${isFavorited ? '<i class="fas fa-bookmark"></i>' : '<i class="far fa-bookmark"></i>'}
                                    </button>
                                </div>
                            `;
                        }
                        
                        productsHtml += `
                            <div class="product-item" data-product-id="${prod.id}" data-store-id="${store.id}" data-product-name="${prod.name}" data-product-url="${window.location.href.split('#')[0]}#product/${store.id}/${prod.id}">
                                <img src="${prod.image}" loading="lazy" alt="${safeSanitize(prod.name)}">
                                <div class="product-name">${safeSanitize(prod.name)}</div>

                                </div>
                                <div>
                                    <a href="#store/${store.id}" class="product-visit-btn"><i class="fas fa-store"></i> ${window.translate('زيارة المتجر', appData)}</a>
                                    ${addToCartBtn}
                                </div>
                                ${actionButtons}
                            </div>
                        `;
                    });
                    
                    const storeLink = store.externalUrl && store.externalUrl !== '#' ? store.externalUrl : '#';
                    storesGrid.innerHTML += `
                        <div class="store-card" data-store-id="${store.id}" data-store-name="${store.name}" data-store-url="${window.location.href.split('#')[0]}#store/${store.id}" onclick="location.href='#store/${store.id}'">
                            <div class="store-header">
                                <img src="${store.logo}" class="store-logo" loading="lazy" alt="${safeSanitize(store.name)}">
                                <div class="store-info">
                                    <h3>
                                        <span>${safeSanitize(store.name)}</span>
                                        <a href="${storeLink}" target="_blank" rel="noopener" class="store-visit-btn" onclick="event.stopPropagation();">
                                            <i class="fas fa-external-link-alt"></i> ${window.translate('زيارة', appData)}
                                        </a>
                                    </h3>
                                    <span class="store-category-badge" style="background:${cat.color}30; color:${cat.color};">${safeSanitize(store.category)}</span>

                            </div>

                    `;
                });
                
                container.appendChild(section);
                
                // إضافة إعلان كاروسيل بين كل 4 فئات
                if ((idx + 1) % 4 === 0 && activeCarousels.length > 0) {
                    const carouselDiv = document.createElement('div');
                    carouselDiv.className = 'carousel-ad';
                    carouselDiv.innerHTML = `
                        <div class="carousel-track">
                            ${activeCarousels.map(ad => `
                                <div class="carousel-slide">
                                    <a href="${ad.link || '#'}" target="_blank" rel="noopener">
                                        <img src="${ad.image}" alt="${safeSanitize(ad.name)}" loading="lazy">
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(carouselDiv);
                }
            });
            
            startCarousel();
            
            // ===== التقييمات =====
            const testimonialsTrack = document.getElementById('testimonialsTrack');
            testimonialsTrack.innerHTML = '';
            (appData.testimonials || []).forEach(t => {
                let starsHtml = '';
                for (let s = 0; s < 5; s++) {
                    starsHtml += s < t.rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
                }
                testimonialsTrack.innerHTML += `
                    <div class="testimonial-card">
                        <img src="${t.image}" class="customer-img" loading="lazy" alt="${safeSanitize(t.name)}">

                trustContainer.innerHTML += `<img src="${badge}" alt="badge" loading="lazy">`;

            // ===== التذييل =====

            // ===== تحديث السلة =====

        // ============================================================
        // 5. دالة التذييل
        // ============================================================
        function renderFooter() {
            const footerSection = document.getElementById('footerSection');
            if (!footerSection) return;
            
            const socialPlatforms = [
                { platform: 'whatsapp', icon: 'fab fa-whatsapp', defaultUrl: 'https://wa.me/' + (window.getWhatsAppNumber ? window.getWhatsAppNumber() : '967778562099') },
                { platform: 'facebook', icon: 'fab fa-facebook-f', defaultUrl: '#' },
                { platform: 'twitter', icon: 'fab fa-twitter', defaultUrl: '#' },
                { platform: 'instagram', icon: 'fab fa-instagram', defaultUrl: '#' },
                { platform: 'telegram', icon: 'fab fa-telegram-plane', defaultUrl: '#' },
                { platform: 'snapchat', icon: 'fab fa-snapchat-ghost', defaultUrl: '#' },
                { platform: 'linkedin', icon: 'fab fa-linkedin-in', defaultUrl: '#' },
                { platform: 'tiktok', icon: 'fab fa-tiktok', defaultUrl: '#' }
            ];
            
            const socialMedia = appData.footer.socialMedia || [];
            const socialItems = socialPlatforms.map(sp => {
                const saved = socialMedia.find(s => s.platform === sp.platform);
                return {
                    ...sp,
                    url: saved && saved.url ? saved.url : sp.defaultUrl,
                    active: saved ? saved.active : true
                };
            }).filter(item => item.active);
            
            const socialHtml = socialItems.map(s => `
                <a href="${s.url}" target="_blank" rel="noopener" aria-label="${s.platform}">
                    <i class="${s.icon}"></i>
                </a>
            `).join('');
            
            footerSection.innerHTML = `
                <div class="contact-section">
                    <h3>${window.translate('تواصل معنا', appData)}</h3>
                    <p>${window.translate('البريد الإلكتروني', appData)}: ${appData.footer.email || ''}</p>
                    <p>${window.translate('الهاتف', appData)}: ${appData.footer.phone || ''}</p>
                    <div class="social-icons">${socialHtml}</div>
                    <div style="display:flex; gap:10px; margin-top:15px; flex-wrap:wrap; justify-content:center;">
                        <button onclick="showContactPage()" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer;">اتصل بنا</button>
                        <button onclick="showPolicyPage()" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer;">سياسة السوق</button>
                        <button onclick="showAboutPage()" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer;">من نحن</button>
                    </div>
                </div>
                <div class="payment-section">
                    <h3>${window.translate('خدمات الدفع', appData)}</h3>
                    <p>${window.translate('طرق دفع آمنة ومتعددة', appData)}</p>
                    <div class="payment-methods">
                        ${(appData.footer.payments || []).map(p => `<i class="${p}"></i>`).join('')}
                    </div>
                </div>
            `;
        }

        // ============================================================
        // 6. دوال الصفحات الفرعية
        // ============================================================
        function showHomePage() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('categoryPage').classList.add('hidden');
            document.getElementById('storePage').classList.add('hidden');
            document.getElementById('searchPage').classList.add('hidden');
            document.getElementById('profilePage').classList.add('hidden');
            document.getElementById('contactPage').classList.add('hidden');
            document.getElementById('policyPage').classList.add('hidden');
            document.getElementById('aboutPage').classList.add('hidden');
            window.closeProductModal();
            window.scrollTo(0, 0);
        }
        window.showHomePage = showHomePage;

        function showCategoryPage(slug) {
            const cat = appData.categories.find(c => c.slug === slug);
            if (!cat) return;
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('categoryPage').classList.remove('hidden');
            const categoryPage = document.getElementById('categoryPage');
            const stores = (appData.stores[cat.name] || []).filter(store => !store.hidden);
            
            let horizontalStores = '';
            stores.slice(0, 10).forEach(store => {
                horizontalStores += `
                    <div class="store-horizontal-card" onclick="location.href='#store/${store.id}'">
                        <img src="${store.logo}" loading="lazy" alt="${safeSanitize(store.name)}">
                        <h4>${safeSanitize(store.name)}</h4>
                    </div>
                `;
            });
            
            let gridStores = '';
            stores.forEach(store => {
                gridStores += `
                    <div class="store-card" onclick="location.href='#store/${store.id}'">
                        <div class="store-header">
                            <img src="${store.logo}" class="store-logo" loading="lazy" alt="${safeSanitize(store.name)}">
                            <div class="store-info">
                                <h3>${safeSanitize(store.name)}</h3>
                                <span class="store-category-badge" style="background:${cat.color}30; color:${cat.color};">${safeSanitize(store.category)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            categoryPage.innerHTML = `
                <div style="padding:2rem;">
                    <button class="back-home-btn" onclick="showHomePage()">${window.translate('العودة للرئيسية', appData)}</button>
                    <h2 style="color:${cat.color};">${safeSanitize(cat.name)}</h2>
                    ${horizontalStores ? '<div class="stores-horizontal"><div class="stores-track">' + horizontalStores + '</div></div>' : ''}
                    <div class="stores-grid">${gridStores || '<p>لا توجد متاجر في هذه الفئة</p>'}</div>
                </div>
            `;
        }
        window.showCategoryPage = showCategoryPage;

        function showStorePage(storeId) {
            let store = null;
            for (let cat in appData.stores) {
                const found = appData.stores[cat].find(s => s.id === storeId);
                if (found) { store = found; break; }
            }
            if (!store) return;
            
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('storePage').classList.remove('hidden');
            const storePage = document.getElementById('storePage');
            
            const realProducts = appData.products[storeId] || [];
            const numStrips = store.numStrips || 10;
            const productsPerStrip = store.productDisplayCount || 10;
            const defaultTitles = [
                "🔥 أحدث المنتجات", "⭐ الأكثر مبيعاً", "💰 عروض خاصة", "🎁 هدايا مع كل طلب",
                "✨ منتجات حصرية", "💎 أعلى تقييم", "📦 عروض التوفير", "🚚 توصيل سريع",
                "🌟 منتجات مميزة", "🛒 إضافات جديدة", "🏆 توصيات اليوم", "💝 هدايا مناسبة",
                "🎯 عروض محدودة", "📱 تقنيات حديثة", "👗 أزياء رائجة"
            ];
            
            const activeBanners = (store.banners || [])
                .filter(b => b.active)
                .sort((a, b) => a.order - b.order);
            
            const strips = Array(numStrips).fill().map(() => []);
            realProducts.forEach((prod, idx) => {
                const stripIndex = idx % numStrips;
                strips[stripIndex].push(prod);
            });
            
            let stripsHtml = '';
            let hasAnyProducts = false;
            const showUserFeatures = appData.settings.enableUserProfile;
            
            for (let i = 0; i < numStrips; i++) {
                let stripProducts = strips[i];
                if (stripProducts.length === 0) {
                    let remainingProducts = 0;
                    for (let j = i; j < numStrips; j++) remainingProducts += strips[j].length;
                    if (remainingProducts === 0) break;
                    continue;
                }
                hasAnyProducts = true;
                stripProducts = stripProducts.slice(0, productsPerStrip);
                let productsHtml = '';
                stripProducts.forEach(prod => {
                    const addToCartBtn = appData.settings.cartEnabled 
                        ? `<button class="add-to-cart-btn" onclick="window.addToCart({id:'${prod.id}', storeId:'${store.id}', name:'${prod.name}', newPrice:${prod.newPrice}, image:'${prod.image}'}, appData)"><i class="fas fa-cart-plus"></i> ${window.translate('إضافة للسلة', appData)}</button>` 
                        : '';
                    const productLink = prod.link && prod.link !== '#' ? prod.link : '#';
                    
                    let actionButtons = '';
                    if (showUserFeatures) {
                        const isLiked = window.currentUser && window.currentUser.likes.includes(prod.id);
                        const isFavorited = window.currentUser && window.currentUser.favorites.includes(prod.id);
                        actionButtons = `
                            <div style="margin-top:5px;">
                                <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="window.toggleLike('${prod.id}', '${store.id}', this)">
                                    ${isLiked ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>'}
                                </button>
                                <button class="favorite-btn ${isFavorited ? 'favorited' : ''}" onclick="window.toggleFavorite('${prod.id}', '${store.id}', this)">
                                    ${isFavorited ? '<i class="fas fa-bookmark"></i>' : '<i class="far fa-bookmark"></i>'}
                                </button>
                            </div>
                        `;
                    }
                    
                    productsHtml += `
                        <div class="product-item" data-product-id="${prod.id}" data-store-id="${store.id}" data-product-name="${prod.name}" data-product-url="${window.location.href.split('#')[0]}#product/${store.id}/${prod.id}">
                            <img src="${prod.image}" loading="lazy" alt="${safeSanitize(prod.name)}">
                            <div class="product-name">${safeSanitize(prod.name)}</div>
                            <div class="price-container">
                                <span class="old-price">${prod.oldPrice} ${window.getCurrencySymbol()}</span>
                                <span class="new-price">${prod.newPrice} ${window.getCurrencySymbol()}</span>
                            </div>
                            <div>
                                <a href="${productLink}" target="_blank" rel="noopener" class="product-visit-btn"><i class="fas fa-external-link-alt"></i> ${window.translate('اطلب الان', appData)}</a>
                                ${addToCartBtn}
                            </div>
                            ${actionButtons}
                        </div>
                    `;
                });
                
                const banner = activeBanners.find(b => b.order === i);
                let stripHeader = '';
                if (!banner) {
                    stripHeader = `<div class="section-title">${defaultTitles[i % defaultTitles.length]}</div>`;
                } else if (banner.type === 'text') {
                    stripHeader = `
                        <div class="banner-text" data-banner-id="${banner.id}" data-store-id="${store.id}">
                            <div class="category-ticker">
                                <div class="category-ticker-content">${safeSanitize(banner.content)}</div>
                            </div>
                        </div>
                    `;
                } else if (banner.type === 'images' && banner.images && banner.images.length > 0) {
                    stripHeader = `
                        <div class="banner-images-carousel" data-banner-id="${banner.id}" data-store-id="${store.id}">
                            <div class="banner-images-track">
                                ${banner.images.map(img => `<img src="${img}" loading="lazy" alt="banner">`).join('')}
                            </div>
                        </div>
                    `;
                }
                
                stripsHtml += `<div class="multi-horizontal">${stripHeader}<div class="products-horizontal"><div class="products-track">${productsHtml}</div></div></div>`;
            }
            
            if (!hasAnyProducts || realProducts.length === 0) {
                stripsHtml = '<p style="text-align:center; padding:20px;">🚫 لا توجد منتجات في هذا المتجر حالياً.</p>';
            }
            
            const waNumber = window.getWhatsAppNumber ? window.getWhatsAppNumber() : '967778562099';
            const shareButtons = `
                <div class="share-buttons">
                    <a href="https://wa.me/${waNumber}?text=${encodeURIComponent(store.name + ' ' + window.location.href)}" target="_blank" rel="noopener" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" class="share-btn facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(store.name)}&url=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" class="share-btn twitter"><i class="fab fa-twitter"></i></a>
                </div>
            `;
            
            let ownerUploadHtml = '';
            if (store.allowUpload) {
                ownerUploadHtml = `
                    <div class="store-owner-upload">
                        <h4>رفع شعار جديد</h4>
                        <input type="password" id="ownerCode-${store.id}" placeholder="الرمز السري">
                        <input type="file" id="ownerLogo-${store.id}" accept="image/*" onchange="window.handleStoreLogoUpload(event, '${store.id}')">
                        <button onclick="window.uploadStoreLogo('${store.id}')">رفع</button>
                    </div>
                `;
            }
            
            storePage.innerHTML = `
                <div style="padding:2rem;">
                    <button class="back-home-btn" onclick="showHomePage()">${window.translate('العودة للرئيسية', appData)}</button>
                    <div style="display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap;">
                        <img src="${store.logo}" style="width:100px; height:100px; border-radius:20px; object-fit:cover;" id="storeLogo-${store.id}" loading="lazy" alt="${safeSanitize(store.name)}">
                        <div>
                            <h2>${safeSanitize(store.name)}</h2>
                            <p>${safeSanitize(store.description || '')}</p>
                            <p><i class="fas fa-phone"></i> ${safeSanitize(store.phone || '')}</p>
                            <p><i class="fas fa-map-marker-alt"></i> ${safeSanitize(store.address || '')}</p>
                            <a href="${store.externalUrl || '#'}" target="_blank" rel="noopener" class="store-visit-btn">${window.translate('زيارة المتجر الأصلي', appData)}</a>
                            ${shareButtons}
                        </div>
                    </div>
                    ${ownerUploadHtml}
                    <h3>منتجات المتجر</h3>
                    ${stripsHtml}
                </div>
            `;
            
            attachLongPressShare();
            
            // تشغيل بث الصور في الإعلانات
            document.querySelectorAll('.banner-images-carousel').forEach(carousel => {
                const track = carousel.querySelector('.banner-images-track');
                const images = track.querySelectorAll('img');
                if (images.length <= 1) return;
                let current = 0;
                setInterval(() => {
                    current = (current + 1) % images.length;
                    track.style.transform = `translateX(-${current * 100}%)`;
                }, 3000);
            });
        }
        window.showStorePage = showStorePage;

        // ============================================================
        // 7. دوال المنتج (مودال)
        // ============================================================
        window.showProductModal = function(storeId, productId) {
            const store = Object.values(appData.stores).flat().find(s => s.id === storeId);
            const product = appData.products[storeId]?.find(p => p.id == productId);
            if (!product) return;
            
            document.getElementById('modalProductImage').src = product.image;
            document.getElementById('modalProductName').textContent = product.name;
            document.getElementById('modalProductPrice').innerHTML = `
                <span class="old-price">${product.oldPrice} ${window.getCurrencySymbol()}</span>
                <span class="new-price">${product.newPrice} ${window.getCurrencySymbol()}</span>
            `;
            document.getElementById('modalProductDescription').textContent = product.description || '';
            document.getElementById('modalProductLink').href = `#store/${storeId}`;
            document.getElementById('modalAddToCart').onclick = () => {
                window.addToCart({
                    id: product.id,
                    storeId: storeId,
                    name: product.name,
                    newPrice: product.newPrice,
                    image: product.image
                }, appData);

        function performSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) return;
            
            const results = [];
            for (let storeId in appData.products) {
                appData.products[storeId].forEach(prod => {
                    if (prod.name.toLowerCase().includes(query)) {
                        results.push({ type: 'product', ...prod, storeId });
                    }
                });
            }
            for (let cat in appData.stores) {
                appData.stores[cat].forEach(store => {
                    if (store.name.toLowerCase().includes(query)) {
                        results.push({ type: 'store', ...store });
                    }
                });
            }
            appData.categories.forEach(cat => {
                if (cat.name.toLowerCase().includes(query)) {
                    results.push({ type: 'category', ...cat });
                }
            });
            
            showSearchResults(results, query);
        }

        function showSearchResults(results, query) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('searchPage').classList.remove('hidden');

            } else {
                html += '<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; padding:1rem 0;">';
                results.forEach(item => {
                    if (item.type === 'product') {
                        html += `

                                <img src="${item.image}" loading="lazy" alt="${safeSanitize(item.name)}">

        function attachLongPressShare() {

        function showSharePopup(e, img) {
            const existing = document.querySelector('.share-popup');
            if (existing) existing.remove();
            const parent = img.closest('.product-item') || img.closest('.store-card');
            if (!parent) return;
            let name, url;
            if (parent.classList.contains('product-item')) {
                name = parent.dataset.productName;
                url = parent.dataset.productUrl;
            } else {
                name = parent.dataset.storeName;
                url = parent.dataset.storeUrl;
            }
            const popup = document.createElement('div');
            popup.className = 'share-popup';
            const rect = img.getBoundingClientRect();
            popup.style.top = (rect.top - 60) + 'px';
            popup.style.left = (rect.left - 100) + 'px';
            const waNumber = window.getWhatsAppNumber ? window.getWhatsAppNumber() : '967778562099';
            popup.innerHTML = `
                <a href="https://wa.me/${waNumber}?text=${encodeURIComponent(name + ' ' + url)}" target="_blank" rel="noopener"><i class="fab fa-whatsapp" style="color:#25d366;"></i></a>
                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}" target="_blank" rel="noopener"><i class="fab fa-facebook" style="color:#1877f2;"></i></a>
                <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}" target="_blank" rel="noopener"><i class="fab fa-twitter" style="color:#1da1f2;"></i></a>
                <button onclick="copyToClipboard('${url}')"><i class="fas fa-link" style="color:#64748b;"></i></button>
            `;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 3000);
            document.addEventListener('click', function closePopup(e) {
                if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', closePopup); }
            });

        // ============================================================
        // 15. تحديث البيانات (Pull to Refresh)
        // ============================================================
        let pullStartY = 0, pullMoveY = 0, pulling = false;

        function updateRefreshIndicator(offset) {
            const indicator = document.getElementById('pullRefreshIndicator');
            if (!indicator) return;
            if (offset > 0 && offset <= 60) {
                indicator.style.top = `${Math.min(0, offset - 60)}px`;
                indicator.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> اسحب للتحديث';
            }
            if (offset >= 60) {
                indicator.innerHTML = '<i class="fas fa-arrow-down"></i> حرر للتحديث';
                indicator.style.top = '0px';
            }
        }

        function hideRefreshIndicator() {
            const indicator = document.getElementById('pullRefreshIndicator');
            if (indicator) {
                indicator.style.top = '-60px';
            }
        }

        function onTouchStart(e) {
            if (window.scrollY === 0) {
                pullStartY = e.touches[0].clientY;
                pulling = true;
            }
        }

        function onTouchMove(e) {
            if (!pulling) return;
            const currentY = e.touches[0].clientY;
            const offset = currentY - pullStartY;
            if (offset > 0) {
                e.preventDefault();
                pullMoveY = offset;
                updateRefreshIndicator(offset);
            }
        }

        async function onTouchEnd() {
            if (!pulling) return;
            pulling = false;
            if (pullMoveY >= 60) {
                const indicator = document.getElementById('pullRefreshIndicator');
                if (indicator) {
                    indicator.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> جاري التحديث...';
                    indicator.style.top = '0px';
                }
                await refreshData();
                hideRefreshIndicator();
                window.showToast('تم تحديث الموقع');
            } else {
                hideRefreshIndicator();
            }
            pullStartY = 0;
            pullMoveY = 0;
        }

        if ('ontouchstart' in window) {
            document.body.addEventListener('touchstart', onTouchStart, { passive: false });
            document.body.addEventListener('touchmove', onTouchMove, { passive: false });
            document.body.addEventListener('touchend', onTouchEnd);
        }

                    renderHomePage();
                    checkNewVisit();
                    injectTrackingCode();
                }
                window.updateCartDisplay(appData);
                if (window.location.hash) window.dispatchEvent(new Event('hashchange'));
                window.showToast("✅ تم تحميل الموقع بنجاح");
            } catch (err) {
                window.logAdminError(err, 'initializeApp');
                if (!cached) {
                    document.getElementById('homePage').innerHTML = `
                        <div style="text-align:center; padding:40px;">
                            <i class="fas fa-sync-alt fa-spin" style="font-size:3rem; color:#fbbf24;"></i>
                            <h3>جاري تحديث الموقع...</h3>
                            <p>يرجى الانتظار قليلاً أو المحاولة لاحقاً</p>
                            <button onclick="location.reload()" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:40px; margin-top:20px; cursor:pointer;">تحديث الصفحة</button>
                        </div>`;
                }
            }
        })();

        // ============================================================
        // 20. BroadcastChannel
        // ============================================================
        if (window.BroadcastChannel) {
            window.broadcastChannel = new BroadcastChannel('markets_channel');
            window.broadcastChannel.onmessage = async (event) => {
                if (event.data.type === 'DB_UPDATE') {
                    try {
                        const freshData = await window.fetchFromSupabase();
                        if (freshData && appData) {
                            window.applyPartialUpdates(appData, freshData);
                            appData = freshData;
                            window.appData = appData;
                            await window.saveToIndexedDB(appData);
                            window.applyDesignSettings(appData);
                            renderHomePage();
                            window.showToast('تم تحديث الموقع');
                        }
                    } catch (err) {
                        window.logAdminError(err, 'BroadcastChannel update');
                    }
                }
            };
        }

        console.log('✅ index.html النهائي تم تحميله بنجاح (بطاقات مستطيلة - منتجات مكبرة - 4 أعمدة في الهواتف)');
    </script>
</body>
</html>
